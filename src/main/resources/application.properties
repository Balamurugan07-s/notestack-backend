spring.application.name=notestack-backend

# MySQL / Cloud DB Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/notestack?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:scott}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${DB_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB
file.upload-dir=uploads/

# JWT
notestack.app.jwtSecret=NoteStackSecretKeyThatIsVeryLongAndSecureEnoughForProduction123456789
notestack.app.jwtExpirationMs=86400000
